name: Solver website monitoring

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-public-site:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://solveraccommodations.com
    steps:
      - name: Check the public homepage
        run: |
          curl --fail --retry 3 --retry-delay 5 --silent --show-error --max-time 20 --proto '=https' "${SITE_URL}/" -o /tmp/homepage.html
          grep --fixed-strings --quiet "Solver Accommodations" /tmp/homepage.html

      - name: Check crawl configuration
        run: |
          curl --fail --retry 3 --retry-delay 5 --silent --show-error --max-time 20 --proto '=https' "${SITE_URL}/robots.txt" -o /tmp/robots.txt
          grep --fixed-strings --quiet "Sitemap: https://solveraccommodations.com/sitemap.xml" /tmp/robots.txt
          curl --fail --retry 3 --retry-delay 5 --silent --show-error --max-time 20 --proto '=https' "${SITE_URL}/sitemap.xml" -o /tmp/sitemap.xml
          grep --fixed-strings --quiet "https://solveraccommodations.com/" /tmp/sitemap.xml
